<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学科 授業準備アプリ</title>
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans JP", sans-serif;
            background-color: #f3f4f6;
        }
        
        /* 考査ブロック用（親）のアコーディオンアニメーション */
        .exam-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        .exam-content.open {
            max-height: 10000px; /* 大量の授業カードに対応できるように大きく */
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 1;
        }

        /* 授業回カード用（子）のアコーディオンアニメーション */
        .card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1), padding 0.25s ease;
        }
        .card-content.open {
            max-height: 400px; /* ちょうど良い高さに調整 */
            transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1), padding 0.25s ease;
        }

        /* 全体進捗＆検索エリア用の折りたたみアニメーション */
        .search-progress-content {
            max-height: 200px; /* 展開時の最大高さの目安 */
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease, opacity 0.2s ease;
            opacity: 1;
        }
        .search-progress-content.collapsed {
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            opacity: 0;
            pointer-events: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .loader {
            border-top-color: #0d9488;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen p-0 sm:p-4">

    <!-- スマホサイズコンテナ -->
    <div class="w-full max-w-md bg-white sm:rounded-3xl shadow-2xl overflow-hidden flex flex-col border border-gray-200 relative" style="height: 100vh; max-height: 850px;">
        
        <!-- 通信中ローディングマスク -->
        <div id="loading-overlay" class="hidden absolute inset-0 bg-white/70 flex flex-col justify-center items-center z-50">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <p class="text-base font-medium text-teal-700" id="loading-text">スプレッドシートと同期中...</p>
        </div>

        <!-- ヘッダー -->
        <div class="bg-gradient-to-r from-teal-600 to-emerald-600 text-white p-4 shadow-md flex-shrink-0">
            <div class="flex justify-between items-center mb-1.5">
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="book-open" class="w-6 h-6"></i>
                    数学科 授業準備
                </h1>
                <span class="text-xs px-2.5 py-1 rounded-full flex items-center gap-1 font-medium" id="sync-status"></span>
            </div>
            <p class="text-xs text-teal-100" id="sub-header-text">スプレッドシート連携システム</p>
        </div>

        <!-- 教科タブ切り替え（7教科横スクロール - 標準サイズですっきり調整） -->
        <div class="bg-gray-50 border-b border-gray-200 px-4 py-2.5 flex gap-2 overflow-x-auto no-scrollbar flex-shrink-0">
            <button onclick="switchTab('数Ⅰ')" id="tab-数Ⅰ" class="tab-btn px-4.5 py-1.5 rounded-full text-sm font-semibold transition bg-teal-600 text-white shadow-sm whitespace-nowrap">数Ⅰ</button>
            <button onclick="switchTab('数Ⅱ')" id="tab-数Ⅱ" class="tab-btn px-4.5 py-1.5 rounded-full text-sm font-semibold transition bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">数Ⅱ</button>
            <button onclick="switchTab('数Ⅲ')" id="tab-数Ⅲ" class="tab-btn px-4.5 py-1.5 rounded-full text-sm font-semibold transition bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">数Ⅲ</button>
            <button onclick="switchTab('数A')" id="tab-数A" class="tab-btn px-4.5 py-1.5 rounded-full text-sm font-semibold transition bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">数A</button>
            <button onclick="switchTab('数B')" id="tab-数B" class="tab-btn px-4.5 py-1.5 rounded-full text-sm font-semibold transition bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">数B</button>
            <button onclick="switchTab('数C')" id="tab-数C" class="tab-btn px-4.5 py-1.5 rounded-full text-sm font-semibold transition bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">数C</button>
            <button onclick="switchTab('基礎数')" id="tab-基礎数" class="tab-btn px-4.5 py-1.5 rounded-full text-sm font-semibold transition bg-white text-gray-600 border border-gray-200 hover:bg-gray-100 whitespace-nowrap">基礎数</button>
        </div>

        <!-- 進捗・検索トグルバー -->
        <div onclick="toggleSearchProgress()" class="bg-teal-50/60 border-b border-gray-200 px-4 py-1.5 flex justify-between items-center cursor-pointer select-none text-xs text-teal-800 hover:bg-teal-100/40 active:bg-teal-100/60 transition flex-shrink-0">
            <span class="flex items-center gap-1.5 font-semibold">
                <i data-lucide="sliders" class="w-3.5 h-3.5 text-teal-600"></i>
                <span id="toggle-sp-text">進捗と検索を隠す</span>
            </span>
            <i id="toggle-sp-icon" data-lucide="chevron-up" class="w-4 h-4 text-teal-600 transition-transform duration-200"></i>
        </div>

        <!-- 検索 ＆ 進捗メーター（折りたたみ対応コンテナ） -->
        <div id="search-progress-area" class="search-progress-content bg-white border-b border-gray-100 p-3 flex-shrink-0">
            <div class="mb-3">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                    <span class="font-medium">選択中の教科の全体進捗</span>
                    <span id="progress-percent" class="font-semibold text-base text-teal-600">0%</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-gradient-to-r from-teal-500 to-emerald-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            <div class="relative">
                <input type="text" id="search-input" oninput="filterCards()" placeholder="授業内容、考査名、小テスト番号で検索..." class="w-full pl-9 pr-4 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-3"></i>
            </div>
        </div>

        <!-- 考査グループ一覧表示エリア（縦スクロール） -->
        <div id="card-list" class="flex-grow p-4 overflow-y-auto space-y-4 bg-gray-50">
            <!-- JavaScriptで考査・授業回のダブルアコーディオンを配置 -->
        </div>

        <!-- 下部ナビゲーション -->
        <div class="bg-white border-t border-gray-200 p-2 flex justify-around text-center flex-shrink-0">
            <button onclick="reloadData()" class="flex flex-col items-center text-teal-600">
                <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1 font-semibold" id="refresh-btn-text">同期更新</span>
            </button>
            <button onclick="openConfig()" class="flex flex-col items-center text-gray-400 hover:text-gray-600">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1 font-semibold">接続設定</span>
            </button>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="config-modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl">
            <h3 class="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
                <i data-lucide="settings" class="text-teal-600"></i>スプシ接続設定
            </h3>
            <p class="text-xs text-gray-500 mb-4">作成したGASの「ウェブアプリ URL」を貼り付けます。</p>
            <div class="mb-4">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">GAS Web App URL</label>
                <input type="text" id="api-url-input" placeholder="https://script.google.com/macros/s/.../exec" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>
            <div class="flex gap-2">
                <button onclick="closeConfig()" class="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded-xl text-sm font-semibold">閉じる</button>
                <button onclick="saveConfig()" class="flex-1 bg-teal-600 text-white py-2.5 rounded-xl text-sm font-semibold">保存して接続</button>
            </div>
        </div>
    </div>

    <!-- カスタムダイアログ -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-xs w-full p-6 text-center shadow-2xl">
            <p id="modal-text" class="text-gray-700 text-sm mb-4 font-semibold whitespace-pre-line leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-teal-600 text-white py-2 rounded-xl text-sm font-semibold">閉じる</button>
        </div>
    </div>

    <script>
        const API_KEY_STORAGE = "MATH_APP_GAS_URL";
        let GAS_API_URL = localStorage.getItem(API_KEY_STORAGE) || "";

        // 7教科に対応したデモ用ダミーデータ（スプシ未連携用）
        const demoData = {
            "数Ⅰ": [
                { id: "1", exam_range: "1中間", title: "命題・条件・p⇒q", test_number: "なし", task_name: null, test_create: true, test_print: false, notebook: false, task_check: false },
                { id: "2", exam_range: "1中間", title: "必要条件・十分条件・条件の否定", test_number: "なし", task_name: null, test_create: true, test_print: true, notebook: false, task_check: false },
                { id: "3", exam_range: "1期末", title: "逆・裏・対偶・対偶の真偽", test_number: "なし", task_name: null, test_create: true, test_print: false, notebook: false, task_check: false },
                { id: "4", exam_range: "1期末", title: "2次関数の最大・最小", test_number: "24", task_name: "関数課題", test_create: true, test_print: true, notebook: true, task_check: false }
            ],
            "数Ⅱ": [
                { id: "1", exam_range: "1中間", title: "一般角・動径", test_number: "1", task_name: null, test_create: true, test_print: true, notebook: false, task_check: false },
                { id: "2", exam_range: "1期末", title: "三角関数", test_number: "4", task_name: "課題①", test_create: true, test_print: true, notebook: true, task_check: false }
            ],
            "数Ⅲ": [{ id: "1", exam_range: "1中間", title: "複素数平面と極形式", test_number: "1", task_name: null, test_create: false, test_print: false, notebook: false, task_check: false }],
            "数A": [{ id: "1", exam_range: "1中間", title: "集合と要素・集合の表し方", test_number: "1", task_name: null, test_create: true, test_print: true, notebook: true, task_check: false }],
            "数B": [{ id: "1", exam_range: "1中間", title: "等差数列と等比数列", test_number: "1", task_name: null, test_create: false, test_print: false, notebook: false, task_check: false }],
            "数C": [{ id: "1", exam_range: "1中間", title: "ベクトルとその演算", test_number: "1", task_name: null, test_create: false, test_print: false, notebook: false, task_check: false }],
            "基礎数": [{ id: "1", exam_range: "1中間", title: "整数の計算と割合", test_number: "なし", task_name: null, test_create: false, test_print: false, notebook: false, task_check: false }]
        };

        let sheetData = {};
        let isDemoMode = false;
        let currentTab = '数Ⅰ';
        
        // 状態管理
        const openExams = new Set(["1中間", "1期末", "2中間", "2期末", "学年末"]); // 展開中の考査範囲（親）
        const openCards = new Set(); // 展開中の授業回カード（子）
        let isSearchProgressOpen = true; // 進捗＆検索エリアが開いているか

        window.onload = function() {
            lucide.createIcons();
            if (GAS_API_URL) { reloadData(); } else { setupDemoMode(); }
        };

        // 進捗・検索コンテナの折りたたみ切り替え関数
        function toggleSearchProgress() {
            const container = document.getElementById('search-progress-area');
            const icon = document.getElementById('toggle-sp-icon');
            const text = document.getElementById('toggle-sp-text');

            if (isSearchProgressOpen) {
                isSearchProgressOpen = false;
                container.classList.add('collapsed');
                icon.style.transform = 'rotate(180deg)';
                text.innerText = '進捗と検索を表示する';
            } else {
                isSearchProgressOpen = true;
                container.classList.remove('collapsed');
                icon.style.transform = 'rotate(0deg)';
                text.innerText = '進捗と検索を隠す';
            }
        }

        // デモ環境初期化
        function setupDemoMode() {
            isDemoMode = true;
            sheetData = JSON.parse(JSON.stringify(demoData));
            renderCards();
            updateSyncStatus();
            alertMessage("【デモモードで起動しました】\n接続設定からURLを設定すると、本物のデータと連動します。");
        }

        // 同期状態バッジ
        function updateSyncStatus() {
            const status = document.getElementById('sync-status');
            const subHeader = document.getElementById('sub-header-text');
            const refreshBtnText = document.getElementById('refresh-btn-text');
            if (isDemoMode) {
                status.className = "text-xs bg-amber-500/20 text-amber-200 px-2 py-1 rounded-full flex items-center gap-1 font-medium";
                status.innerHTML = `<span class="w-2 h-2 rounded-full bg-amber-400"></span>デモ動作中`;
                subHeader.innerText = "お試しデモ環境（スプシ未連携）";
                refreshBtnText.innerText = "デモリセット";
            } else {
                status.className = "text-xs bg-white/20 text-white px-2 py-1 rounded-full flex items-center gap-1 font-medium";
                status.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>同期中`;
                subHeader.innerText = "マイ・スプレッドシート連携システム";
                refreshBtnText.innerText = "同期更新";
            }
        }

        function alertMessage(msg) {
            document.getElementById('modal-text').innerText = msg;
            document.getElementById('custom-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }
        function openConfig() {
            document.getElementById('api-url-input').value = isDemoMode ? "" : GAS_API_URL;
            document.getElementById('config-modal').classList.remove('hidden');
        }
        function closeConfig() { document.getElementById('config-modal').classList.add('hidden'); }

        function saveConfig() {
            const url = document.getElementById('api-url-input').value.trim();
            closeConfig();
            if (!url) { setupDemoMode(); return; }
            if (!url.startsWith("https://script.google.com/")) { alertMessage("正しいURLではありません。"); return; }
            GAS_API_URL = url;
            localStorage.setItem(API_KEY_STORAGE, url);
            isDemoMode = false;
            reloadData();
        }

        function toggleLoading(show, text = "") {
            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-text').innerText = text;
            if (show) overlay.classList.remove('hidden'); else overlay.classList.add('hidden');
        }

        function reloadData() {
            if (isDemoMode) { sheetData = JSON.parse(JSON.stringify(demoData)); renderCards(); return; }
            if (!GAS_API_URL) { openConfig(); return; }
            toggleLoading(true, "データを取得しています...");
            fetch(GAS_API_URL)
                .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                .then(data => { sheetData = data; renderCards(); updateSyncStatus(); toggleLoading(false); })
                .catch(() => { toggleLoading(false); alertMessage("データ取得に失敗しました。URLや共有設定をご確認ください。"); });
        }

        function switchTab(tabName) {
            currentTab = tabName;
            openCards.clear(); // タブ切り替え時に展開カードをリセット
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-teal-600', 'text-white', 'shadow-sm');
                btn.classList.add('bg-white', 'text-gray-600', 'border', 'border-gray-200');
            });
            const activeTab = document.getElementById(`tab-${tabName}`);
            if (activeTab) {
                activeTab.classList.remove('bg-white', 'text-gray-600', 'border', 'border-gray-200');
                activeTab.classList.add('bg-teal-600', 'text-white', 'shadow-sm');
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
            document.getElementById('search-input').value = '';
            renderCards();
        }

        function updateProgressBar() {
            const list = sheetData[currentTab] || [];
            let total = 0, checked = 0;
            list.forEach(item => {
                total += 3;
                if (item.test_create) checked++;
                if (item.test_print) checked++;
                if (item.notebook) checked++;
                if (item.task_name) { total += 1; if (item.task_check) checked++; }
            });
            const percent = total > 0 ? Math.round((checked / total) * 100) : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-percent').innerText = `${percent}%`;
        }

        // 🌟 考査・授業回のダブルアコーディオン構成で描画する関数
        function renderCards() {
            const list = sheetData[currentTab] || [];
            const container = document.getElementById('card-list');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400 text-lg font-medium"><i data-lucide="info" class="w-10 h-10 mx-auto mb-2"></i>シート「${currentTab}」にデータがありません。</div>`;
                lucide.createIcons();
                updateProgressBar();
                return;
            }

            // 1. データを考査範囲ごとにグループ化
            const groups = {};
            list.forEach(item => {
                const exam = item.exam_range || "未定";
                if (!groups[exam]) groups[exam] = [];
                groups[exam].push(item);
            });

            // 2. 各考査グループ（親）のアコーディオンを生成
            Object.keys(groups).forEach(examName => {
                const itemsInGroup = groups[examName];
                const isExamOpen = openExams.has(examName);
                
                // 考査内進捗率
                let gTotal = 0, gChecked = 0;
                itemsInGroup.forEach(item => {
                    gTotal += 3;
                    if (item.test_create) gChecked++; if (item.test_print) gChecked++; if (item.notebook) gChecked++;
                    if (item.task_name) { gTotal++; if (item.task_check) gChecked++; }
                });
                const gPercent = gTotal > 0 ? Math.round((gChecked / gTotal) * 100) : 0;

                // 考査範囲ごとのカラーアクセント設定（左側の細いボーダーとバッジ色）
                let borderColorClass = "border-slate-400";
                let textColorClass = "text-slate-800";
                let badgeColorClass = "bg-slate-100 text-slate-600 border border-slate-200/60";
                
                if (examName.includes("中間")) {
                    borderColorClass = "border-sky-500";
                    textColorClass = "text-sky-900";
                    badgeColorClass = "bg-sky-50 text-sky-700 border border-sky-100";
                } else if (examName.includes("期末")) {
                    borderColorClass = "border-purple-500";
                    textColorClass = "text-purple-900";
                    badgeColorClass = "bg-purple-50 text-purple-700 border border-purple-100";
                } else if (examName.includes("学年末")) {
                    borderColorClass = "border-rose-500";
                    textColorClass = "text-rose-900";
                    badgeColorClass = "bg-rose-50 text-rose-700 border border-rose-100";
                }

                // 親コンテナ作成（角丸カードとして統一）
                const groupWrapper = document.createElement('div');
                groupWrapper.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden exam-group-container";
                groupWrapper.dataset.exam = examName;

                // 親ヘッダーのHTML（文字サイズを text-base, text-xs の元の落ち着いた大きさに統一。サイズをすべて固定配置）
                let headerHTML = `
                    <div onclick="toggleExamAccordion('${examName}')" class="bg-white border-l-4 ${borderColorClass} h-14 px-4 flex justify-between items-center cursor-pointer select-none font-semibold shadow-sm hover:bg-gray-50/50 transition duration-150">
                        <div class="flex items-center">
                            <!-- 幅を固定して位置を完璧に揃える -->
                            <span class="text-base tracking-wide ${textColorClass} w-24 block truncate">${examName} 範囲</span>
                            <span class="text-[10px] ${badgeColorClass} px-2.5 py-0.5 rounded-full font-medium text-center w-20 block truncate">全 ${itemsInGroup.length} 単元</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-gray-500 font-medium w-16 text-right">${gPercent}% 完了</span>
                            <i id="exam-icon-${examName}" data-lucide="chevron-down" class="w-4 h-4 text-gray-400 transition-transform duration-200" style="${isExamOpen ? 'transform: rotate(180deg);' : ''}"></i>
                        </div>
                    </div>
                    <div id="exam-content-${examName}" class="exam-content ${isExamOpen ? 'open' : ''} bg-gray-50/50 p-2.5 space-y-2.5">
                `;

                // 3. 各授業カード（子）のアコーディオンを生成
                itemsInGroup.forEach(item => {
                    const activeProcessCount = item.task_name ? 4 : 3;
                    const checkedCount = [item.test_create, item.test_print, item.notebook, (item.task_name ? item.task_check : null)].filter(Boolean).length;
                    const isCardOpen = openCards.has(item.id);

                    let statusBadge = '<span class="px-1.5 py-0.5 text-[10px] font-medium rounded bg-gray-100 text-gray-400">未着手</span>';
                    if (checkedCount === activeProcessCount) {
                        statusBadge = '<span class="px-1.5 py-0.5 text-[10px] font-medium rounded bg-green-100 text-green-700">完了</span>';
                    } else if (checkedCount > 0) {
                        statusBadge = `<span class="px-1.5 py-0.5 text-[10px] font-medium rounded bg-amber-100 text-amber-700">準備中 (${checkedCount}/${activeProcessCount})</span>`;
                    }

                    const testNumberText = item.test_number !== "なし" && item.test_number ? `小テスト #${item.test_number}` : "小テスト なし";
                    const testBadgeColor = item.test_number !== "なし" && item.test_number ? "bg-rose-50 text-rose-600 border border-rose-100 animate-pulse font-medium" : "bg-gray-100 text-gray-400 font-medium";
                    const taskBadge = item.task_name ? `<span class="inline-flex px-1.5 py-0.5 text-[10px] font-medium rounded bg-indigo-50 text-indigo-600 border border-indigo-100 items-center gap-1 mt-1"><i data-lucide="clipboard" class="w-3 h-3"></i>${item.task_name}</span>` : "";

                    headerHTML += `
                        <div class="bg-white rounded-xl border border-gray-100 overflow-hidden shadow-sm card-item" data-title="${item.title}" data-testnumber="${item.test_number}" data-taskname="${item.task_name || ''}">
                            <!-- 子アコーディオン：ヘッダー（単元タイトルは太字をやめ、すっきり大きめの text-base font-semibold に調整） -->
                            <div onclick="toggleCardAccordion(event, '${item.id}')" class="p-3.5 flex justify-between items-center cursor-pointer hover:bg-gray-50/50 select-none">
                                <div class="flex-grow pr-2">
                                    <div class="flex items-center gap-1.5 mb-1">
                                        <span class="text-[10px] font-semibold text-gray-400">No. ${item.id}</span>
                                        ${statusBadge}
                                    </div>
                                    <h4 class="text-base font-semibold text-gray-800 leading-snug">${item.title}</h4>
                                    ${taskBadge}
                                </div>
                                <div class="flex items-center gap-2 flex-shrink-0">
                                    <span class="px-1.5 py-0.5 text-[10px] font-medium rounded-md ${testBadgeColor}">${testNumberText}</span>
                                    <i id="card-icon-${item.id}" data-lucide="chevron-down" class="w-4 h-4 text-gray-400 transition-transform duration-200" style="${isCardOpen ? 'transform: rotate(180deg);' : ''}"></i>
                                </div>
                            </div>

                            <!-- 子アコーディオン：開閉するチェックボックス部 -->
                            <div id="card-content-${item.id}" class="card-content ${isCardOpen ? 'open' : ''} bg-gray-50/30 border-t border-gray-100/50">
                                <div class="p-3.5 space-y-2 text-base text-gray-700">
                                    <label onclick="toggleAndSync(event, '${item.id}', 'test_create')" class="flex items-center justify-between p-2 rounded-lg hover:bg-white/80 cursor-pointer select-none">
                                        <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-rose-400"></span>小テスト 【作成】</span>
                                        <input type="checkbox" ${item.test_create ? 'checked' : ''} class="w-6 h-6 text-teal-600 rounded-md border-gray-300 focus:ring-teal-500 pointer-events-none">
                                    </label>
                                    <label onclick="toggleAndSync(event, '${item.id}', 'test_print')" class="flex items-center justify-between p-2 rounded-lg hover:bg-white/80 cursor-pointer select-none">
                                        <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-orange-400"></span>小テスト 【印刷】</span>
                                        <input type="checkbox" ${item.test_print ? 'checked' : ''} class="w-6 h-6 text-teal-600 rounded-md border-gray-300 focus:ring-teal-500 pointer-events-none">
                                    </label>
                                    <label onclick="toggleAndSync(event, '${item.id}', 'notebook')" class="flex items-center justify-between p-2 rounded-lg hover:bg-white/80 cursor-pointer select-none">
                                        <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full bg-indigo-400"></span>ノートをまとめる</span>
                                        <input type="checkbox" ${item.notebook ? 'checked' : ''} class="w-6 h-6 text-teal-600 rounded-md border-gray-300 focus:ring-teal-500 pointer-events-none">
                                    </label>
                                    ${item.task_name ? `
                                    <label onclick="toggleAndSync(event, '${item.id}', 'task_check')" class="flex items-center justify-between p-2 bg-indigo-50/50 text-indigo-700 rounded-lg hover:bg-indigo-50 cursor-pointer select-none font-medium">
                                        <span class="flex items-center gap-1.5"><i data-lucide="clipboard-check" class="w-4 h-4"></i>提出課題チェック</span>
                                        <input type="checkbox" ${item.task_check ? 'checked' : ''} class="w-6 h-6 text-indigo-600 rounded-md border-indigo-300 focus:ring-indigo-500 pointer-events-none">
                                    </label>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });

                headerHTML += `</div>`; // 親コンテンツクローズ
                groupWrapper.innerHTML = headerHTML;
                container.appendChild(groupWrapper);
            });

            updateProgressBar();
            lucide.createIcons();
        }

        // 親：考査範囲の開閉
        function toggleExamAccordion(examName) {
            const content = document.getElementById(`exam-content-${examName}`);
            const icon = document.getElementById(`exam-icon-${examName}`);
            if (openExams.has(examName)) {
                openExams.delete(examName);
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                openExams.add(examName);
                content.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // 子：授業回カードの開閉
        function toggleCardAccordion(event, id) {
            event.stopPropagation();
            const content = document.getElementById(`card-content-${id}`);
            const icon = document.getElementById(`card-icon-${id}`);
            if (openCards.has(id)) {
                openCards.delete(id);
                content.classList.remove('open');
                icon.style.transform = 'rotate(0deg)';
            } else {
                openCards.add(id);
                content.classList.add('open');
                icon.style.transform = 'rotate(180deg)';
            }
        }

        function toggleAndSync(event, itemId, field) {
            event.preventDefault();
            event.stopPropagation();
            
            const list = sheetData[currentTab];
            const target = list.find(item => String(item.id) === String(itemId));
            if (!target) return;

            const oldValue = target[field];
            const newValue = !oldValue;
            target[field] = newValue;
            renderCards();

            if (isDemoMode) { updateProgressBar(); return; }

            toggleLoading(true, "スプレッドシートを更新中...");
            const payload = { sheetName: currentTab, id: itemId, field: field, value: newValue };

            fetch(GAS_API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => { toggleLoading(false); updateProgressBar(); })
            .catch(() => {
                target[field] = oldValue;
                renderCards();
                toggleLoading(false);
                alertMessage("同期に失敗しました。");
            });
        }

        function filterCards() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.card-item');

            cards.forEach(card => {
                const title = card.dataset.title.toLowerCase();
                const testNumber = card.dataset.testnumber.toLowerCase();
                const taskName = card.dataset.taskname.toLowerCase();
                
                if (title.includes(query) || testNumber.includes(query) || taskName.includes(query)) {
                    card.style.display = 'block';
                    // 検索一致時は子アコーディオンを自動で展開させて見やすく
                    if (query !== "") {
                        const id = card.querySelector('.card-content').id.replace('card-content-', '');
                        openCards.add(id);
                    }
                } else {
                    card.style.display = 'none';
                }
            });

            const containers = document.querySelectorAll('.exam-group-container');
            containers.forEach(container => {
                const visibleCards = container.querySelectorAll('.card-item[style="display: block;"]').length;
                const examName = container.dataset.exam;
                
                if (query === "") {
                    container.style.display = 'block';
                    container.querySelectorAll('.card-item').forEach(c => c.style.display = 'block');
                } else if (visibleCards > 0) {
                    container.style.display = 'block';
                    // 検索中、該当する親グループを自動展開
                    openExams.add(examName);
                } else {
                    container.style.display = 'none';
                }
            });

            // 表示状態を一元反映
            renderCards();
        }
    </script>
</body>
</html>
